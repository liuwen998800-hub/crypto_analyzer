# FMZ发明者量化平台配置
# 请填写你的FMZ API Key和Secret Key

fmz:
  # FMZ API配置
  api_key: "your_fmz_api_key_here"
  secret_key: "your_fmz_secret_key_here"
  base_url: "https://api.fmz.com"
  
  # 默认交易所配置
  default_exchange: "binance"
  
  # 交易配置
  trading:
    # 最小置信度（低于此值不执行交易）
    min_confidence: 60
    
    # 默认交易数量
    default_amount:
      BTC: 0.001
      ETH: 0.01
      USDT: 100
    
    # 最大持仓比例（单次交易不超过总资金的百分比）
    max_position_ratio: 0.5
    
    # 止损配置
    stop_loss:
      enabled: true
      ratio: 0.05  # 5%止损
    
    # 止盈配置
    take_profit:
      enabled: true
      ratio: 0.10  # 10%止盈
  
  # 策略配置
  strategy:
    # AI策略名称
    ai_strategy_name: "AI量化策略"
    
    # 检查间隔（秒）
    check_interval: 300
    
    # 是否启用自动交易
    auto_trading: false
    
    # 回测配置
    backtest:
      enabled: false
      start_date: "2024-01-01"
      end_date: "2024-12-31"
      initial_capital: 10000
  
  # 监控配置
  monitoring:
    # 是否启用监控
    enabled: true
    
    # 监控间隔（秒）
    interval: 60
    
    # 报警配置
    alert:
      # 亏损报警阈值
      loss_threshold: 0.10  # 10%
      
      # 持仓变化报警
      position_change_threshold: 0.20  # 20%
      
      # 通知方式
      notify_methods:
        - "log"
        # - "email"
        # - "telegram"

# 交易所API配置（如果需要直接对接交易所）
exchanges:
  binance:
    api_key: ""
    secret_key: ""
    testnet: false
    
  okex:
    api_key: ""
    secret_key: ""
    passphrase: ""
    
  huobi:
    api_key: ""
    secret_key: ""

# AI信号配置
ai_signal:
  # AI分析服务器地址
  server_url: "http://localhost:5000"
  
  # 信号获取端点
  signal_endpoint: "/api/ai-signal"
  
  # 信号格式
  signal_format:
    required_fields:
      - "symbol"
      - "direction"
      - "confidence"
      - "timestamp"
    optional_fields:
      - "price"
      - "amount"
      - "reasoning"
      - "support_levels"
      - "resistance_levels"
  
  # 信号缓存时间（秒）
  cache_ttl: 60

# 日志配置
logging:
  level: "INFO"
  file: "logs/fmz_trading.log"
  max_size_mb: 10
  backup_count: 5

# 数据库配置（可选，用于记录交易历史）
database:
  enabled: false
  type: "sqlite"  # sqlite/mysql/postgresql
  path: "data/trading.db"
  
  # MySQL配置示例
  # host: "localhost"
  # port: 3306
  # username: "root"
  # password: "password"
  # database: "trading"

# 风险管理配置
risk_management:
  # 每日最大交易次数
  daily_max_trades: 10
  
  # 单日最大亏损比例
  daily_max_loss_ratio: 0.05  # 5%
  
  # 最大连续亏损次数
  max_consecutive_losses: 3
  
  # 冷却时间（连续亏损后的暂停时间，分钟）
  cooldown_minutes: 60

# 性能优化配置
performance:
  # API请求重试次数
  max_retries: 3
  
  # 请求超时时间（秒）
  timeout: 10
  
  # 连接池大小
  connection_pool: 10