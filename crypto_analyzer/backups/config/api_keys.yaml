  api_key: ""

# 数据库配置
database:
  # SQLite (开发环境)
  sqlite_path: "data/crypto_analysis.db"
  
  # PostgreSQL (生产环境)
  postgres:
    host: "localhost"
    port: 5432
    database: "crypto_analysis"
    username: ""
    password: ""

# 调度配置
scheduler:
  analysis_interval_hours: 1
  report_timezone: "Asia/Shanghai"
  retry_attempts: 3
  retry_delay_seconds: 60

# 评分权重配置
scoring_weights:
  technical: 0.4
  ai_analysis: 0.4
  sentiment: 0.2
  
  # 技术指标子权重
  technical_breakdown:
    rsi: 0.25
    macd: 0.25
    moving_averages: 0.20
    bollinger_bands: 0.15
    volume: 0.15

# 信号阈值
signal_thresholds:
  strong_buy: 80
  buy: 60
  neutral: 40
  sell: 20
  strong_sell: 0

# 支撑阻力位计算
support_resistance:
  lookback_periods: 20  # 回顾周期数
  pivot_periods: 5      # 枢轴点周期
  tolerance_pct: 0.02   # 容忍百分比