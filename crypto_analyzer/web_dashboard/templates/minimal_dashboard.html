<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虚拟币分析系统 - 前端界面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #eee;
        }
        h1 {
            color: #333;
            margin: 0;
        }
        .subtitle {
            color: #666;
            margin-top: 5px;
        }
        .control-panel {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #007bff;
            color: white;
        }
        .btn-primary:hover {
            background: #0056b3;
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        .btn-secondary:hover {
            background: #545b62;
        }
        .btn-active {
            background: #28a745;
            color: white;
        }
        .analysis-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            width: 100%;
            margin-top: 20px;
        }
        .results {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        .card h3 {
            margin-top: 0;
            color: #333;
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
        }
        .price-display {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 10px;
            margin: 20px 0;
        }
        .price {
            font-size: 48px;
            font-weight: bold;
            color: #333;
        }
        .change {
            font-size: 24px;
            font-weight: bold;
        }
        .change.positive {
            color: #28a745;
        }
        .change.negative {
            color: #dc3545;
        }
        .signal {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            margin: 10px 0;
        }
        .signal-buy {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }
        .signal-sell {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }
        .signal-neutral {
            background: #fff3cd;
            color: #856404;
            border: 2px solid #ffeaa7;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 虚拟币分析系统</h1>
            <div class="subtitle">增强版 | 双AI模型分析 | 实时数据</div>
        </header>
        
        <div class="control-panel">
            <h3>分析控制</h3>
            
            <div>
                <label>选择币种:</label>
                <div class="btn-group">
                    <button class="btn btn-primary btn-active" data-coin="BTC">比特币 (BTC)</button>
                    <button class="btn btn-secondary" data-coin="ETH">以太坊 (ETH)</button>
                    <button class="btn btn-secondary" data-coin="SOL">Solana (SOL)</button>
                </div>
            </div>
            
            <div>
                <label>时间框架:</label>
                <div class="btn-group">
                    <button class="btn btn-primary btn-active" data-timeframe="1h">1小时</button>
                    <button class="btn btn-secondary" data-timeframe="4h">4小时</button>
                    <button class="btn btn-secondary" data-timeframe="24h">24小时</button>
                </div>
            </div>
            
            <div>
                <label>AI模型:</label>
                <div class="btn-group">
                    <button class="btn btn-primary btn-active" data-model="both">双模型分析</button>
                    <button class="btn btn-secondary" data-model="deepseek">DeepSeek</button>
                    <button class="btn btn-secondary" data-model="minimax">MiniMax</button>
                </div>
            </div>
            
            <button class="btn analysis-btn" id="analyzeBtn">
                🔍 开始AI分析
            </button>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>分析中，请稍候...</p>
            </div>
        </div>
        
        <div class="price-display">
            <div class="price" id="coinPrice">$--</div>
            <div class="change" id="priceChange">--%</div>
            <div style="margin-top: 10px; color: #666;">
                <span id="coinName">比特币 (BTC)</span> | 
                <span id="currentTimeframe">1小时框架</span>
            </div>
        </div>
        
        <div class="results">
            <div class="card">
                <h3>📊 分析结果</h3>
                <div style="text-align: center; padding: 20px;">
                    <div style="font-size: 36px; font-weight: bold; color: #333;" id="score">--</div>
                    <div style="color: #666; margin-bottom: 20px;">综合评分 /100</div>
                    <div class="signal" id="signal">等待分析</div>
                </div>
            </div>
            
            <div class="card">
                <h3>🤖 AI分析</h3>
                <div id="aiAnalysis">
                    <p style="text-align: center; color: #666; padding: 20px;">
                        点击"开始AI分析"获取AI分析结果
                    </p>
                </div>
            </div>
            
            <div class="card">
                <h3>📈 技术指标</h3>
                <div id="technicalIndicators">
                    <p style="text-align: center; color: #666; padding: 20px;">
                        等待技术指标数据...
                    </p>
                </div>
            </div>
        </div>
        
        <div style="margin-top: 30px; text-align: center; color: #666; font-size: 14px;">
            <p>系统状态: <span id="systemStatus" style="color: #28a745;">正常</span> | 
               最后更新: <span id="lastUpdate">--:--:--</span></p>
            <p>访问 <a href="/api/status" target="_blank">API状态</a> | 
               <a href="/api/latest" target="_blank">最新数据</a></p>
        </div>
    </div>
    
    <script>
        // 当前选择
        let currentCoin = 'BTC';
        let currentTimeframe = '1h';
        let currentModel = 'both';
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 币种选择
            document.querySelectorAll('[data-coin]').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('[data-coin]').forEach(b => {
                        b.classList.remove('btn-active');
                        b.classList.add('btn-secondary');
                    });
                    this.classList.remove('btn-secondary');
                    this.classList.add('btn-active');
                    currentCoin = this.dataset.coin;
                    updateCoinDisplay();
                });
            });
            
            // 时间框架选择
            document.querySelectorAll('[data-timeframe]').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('[data-timeframe]').forEach(b => {
                        b.classList.remove('btn-active');
                        b.classList.add('btn-secondary');
                    });
                    this.classList.remove('btn-secondary');
                    this.classList.add('btn-active');
                    currentTimeframe = this.dataset.timeframe;
                    document.getElementById('currentTimeframe').textContent = 
                        currentTimeframe === '1h' ? '1小时框架' : 
                        currentTimeframe === '4h' ? '4小时框架' : '24小时框架';
                });
            });
            
            // AI模型选择
            document.querySelectorAll('[data-model]').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('[data-model]').forEach(b => {
                        b.classList.remove('btn-active');
                        b.classList.add('btn-secondary');
                    });
                    this.classList.remove('btn-secondary');
                    this.classList.add('btn-active');
                    currentModel = this.dataset.model;
                });
            });
            
            // 分析按钮
            document.getElementById('analyzeBtn').addEventListener('click', performAnalysis);
            
            // 检查系统状态
            checkSystemStatus();
            
            // 更新时间
            updateTime();
            setInterval(updateTime, 1000);
        });
        
        // 更新币种显示
        function updateCoinDisplay() {
            const names = {
                'BTC': '比特币 (BTC)',
                'ETH': '以太坊 (ETH)',
                'SOL': 'Solana (SOL)'
            };
            document.getElementById('coinName').textContent = names[currentCoin] || currentCoin;
        }
        
        // 更新时间
        function updateTime() {
            const now = new Date();
            document.getElementById('lastUpdate').textContent = 
                now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
        }
        
        // 检查系统状态
        async function checkSystemStatus() {
            try {
                const response = await fetch('/api/status');
                if (response.ok) {
                    document.getElementById('systemStatus').textContent = '正常';
                    document.getElementById('systemStatus').style.color = '#28a745';
                }
            } catch (error) {
                document.getElementById('systemStatus').textContent = '异常';
                document.getElementById('systemStatus').style.color = '#dc3545';
            }
        }
        
        // 执行分析
        async function performAnalysis() {
            const loading = document.getElementById('loading');
            const analyzeBtn = document.getElementById('analyzeBtn');
            
            // 显示加载
            loading.style.display = 'block';
            analyzeBtn.disabled = true;
            analyzeBtn.textContent = '分析中...';
            
            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        symbol: currentCoin,
                        timeframe: currentTimeframe,
                        ai_model: currentModel
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                displayResults(data);
                
            } catch (error) {
                alert('分析失败: ' + error.message);
                console.error('分析错误:', error);
            } finally {
                // 隐藏加载
                loading.style.display = 'none';
                analyzeBtn.disabled = false;
                analyzeBtn.textContent = '🔍 开始AI分析';
                
                // 更新系统状态
                checkSystemStatus();
            }
        }
        
        // 显示结果
        function displayResults(data) {
            // 价格信息
            const price = data.price_data.current_price;
            const change = data.price_data.price_change_pct_24h;
            
            document.getElementById('coinPrice').textContent = `$${price.toLocaleString()}`;
            document.getElementById('priceChange').textContent = `${change >= 0 ? '+' : ''}${change.toFixed(2)}%`;
            document.getElementById('priceChange').className = `change ${change >= 0 ? 'positive' : 'negative'}`;
            
            // 评分和信号
            const score = data.composite_score.composite;
            const signal = data.signal.signal;
            
            document.getElementById('score').textContent = score;
            const signalElement = document.getElementById('signal');
            signalElement.textContent = signal;
            signalElement.className = 'signal';
            
            if (signal.includes('BUY')) {
                signalElement.classList.add('signal-buy');
            } else if (signal.includes('SELL')) {
                signalElement.classList.add('signal-sell');
            } else {
                signalElement.classList.add('signal-neutral');
            }
            
            // AI分析
            const aiData = data.ai_analysis.consensus;
            const aiHtml = `
                <div style="padding: 10px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                        <span>方向:</span>
                        <span style="font-weight: bold; color: ${aiData.direction === 'bullish' ? '#28a745' : aiData.direction === 'bearish' ? '#dc3545' : '#ffc107'}">
                            ${aiData.direction === 'bullish' ? '看涨' : aiData.direction === 'bearish' ? '看跌' : '中性'}
                        </span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                        <span>置信度:</span>
                        <span>${aiData.confidence}%</span>
                    </div>
                    <div style="margin-top: 15px;">
                        <div style="font-weight: bold; margin-bottom: 5px;">分析理由:</div>
                        <div style="color: #666; font-size: 14px;">${aiData.reasoning}</div>
                    </div>
                </div>
            `;
            document.getElementById('aiAnalysis').innerHTML = aiHtml;
            
            // 技术指标
            const indicators = data.technical_indicators.core_indicators;
            let indicatorsHtml = '<div style="padding: 10px;">';
            
            if (indicators.rsi) {
                const rsiValue = indicators.rsi.value;
                let rsiStatus = '正常';
                if (rsiValue > 70) rsiStatus = '超买';
                else if (rsiValue < 30) rsiStatus = '超卖';
                
                indicatorsHtml += `
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                        <span>RSI:</span>
                        <span style="color: ${rsiValue > 70 ? '#dc3545' : rsiValue < 30 ? '#28a745' : '#333'}">
                            ${rsiValue.toFixed(2)} (${rsiStatus})
                        </span>
                    </div>
                `;
            }
            
            if (indicators.macd) {
                const macdValue = indicators.macd.value;
                indicatorsHtml += `
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                        <span>MACD:</span>
                        <span style="color: ${macdValue > 0 ? '#28a745' : '#dc3545'}">
                            ${macdValue.toFixed(2)} (${macdValue > 0 ? '看涨' : '看跌'})
                        </span>
                    </div>
                `;
            }
            
            indicatorsHtml += '</div>';
            document.getElementById('technicalIndicators').innerHTML = indicatorsHtml;
            
            // 更新时间
            updateTime();
        }
        
        // 初始显示
        updateCoinDisplay();
    </script>
</body>
</html>
